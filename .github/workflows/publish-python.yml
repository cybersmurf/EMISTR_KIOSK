name: Publish Python EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install PyQt6 PyQt6-WebEngine pyserial
        pip install customtkinter Pillow

    - name: Build browser_engine.exe
      run: pyinstaller browser_engine.spec

    - name: Build KioskGenerator.exe
      run: pyinstaller KioskGenerator.spec

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/browser_engine.exe
          dist/KioskGenerator.exe
